<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Hijri Date Widget</title>
  <style>
    html, body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .widget {
      text-align: center;
      width: 90%;       /* utilise presque toute la largeur disponible */
      max-width: 1000px; /* limite pour écrans très larges */
    }

    .hijri {
      font-size: 10vw;     /* taille très grande relative à la largeur */
      font-weight: bold;
      white-space: nowrap;  /* reste sur une ligne */
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

<div class="widget">
  <div class="hijri" id="hijriDate"></div>
</div>

<script>
  const today = new Date();

  fetch(`https://api.aladhan.com/v1/gToH?date=${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}&method=4`)
    .then(response => response.json())
    .then(data => {
      const hijri = data.data.hijri;
      const hijriDate = `${hijri.day} ${hijri.month.en} ${hijri.year} AH`; 
      document.getElementById("hijriDate").innerText = hijriDate;
    })
    .catch(() => {
      document.getElementById("hijriDate").innerText = "Erreur";
    });
</script>

</body>
</html>
