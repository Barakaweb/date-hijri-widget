<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hijri Date Widget</title>

  <!-- IMPORTANT pour Notion -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent; /* Important pour Notion */
      font-family: Arial, sans-serif;
    }

    .widget {
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      padding: 16px;
      border-radius: 16px;
      background: #000;
      color: white;
    }

    .hijri {
      font-size: clamp(16px, 4vw, 24px);
      font-weight: bold;
      line-height: 1.4;
      word-wrap: break-word;
    }
  </style>
</head>

<body>

<div class="widget">
  <div class="hijri" id="hijriDate">Loading...</div>
</div>

<script>
  const today = new Date();

  fetch(`https://api.aladhan.com/v1/gToH?date=${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}`)
    .then(response => response.json())
    .then(data => {
      const hijri = data.data.hijri;
      const hijriDate = `ff${hijri.day} ${hijri.month.en} ${hijri.year} AH`;
      document.getElementById("hijriDate").innerText = hijriDate;
    })
    .catch(() => {
      document.getElementById("hijriDate").innerText = "Erreur";
    });
</script>

</body>
</html>
