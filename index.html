<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hijri Date Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000; /* Fond noir complet */
      font-family: Arial, sans-serif;
    }

    .widget {
      width: 100%;
      min-height: 120px; /* Hauteur idéale pour Notion */
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: #000;
      color: #fff;
      border-radius: 16px;
      box-sizing: border-box;
      padding: 20px;
    }

    .hijri {
      font-size: clamp(22px, 6vw, 36px); /* Plus grand */
      font-weight: bold;
      line-height: 1.3;
    }
  </style>
</head>

<body>

<div class="widget">
  <div class="hijri" id="hijriDate">Loading...</div>
</div>

<script>
  const today = new Date();

  fetch(`https://api.aladhan.com/v1/gToH?date=${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}`)
    .then(response => response.json())
    .then(data => {
      const hijri = data.data.hijri;
      const hijriDate = `${hijri.day} ${hijri.month.en} ${hijri.year} AH`;
      document.getElementById("hijriDate").innerText = hijriDate;
    })
    .catch(() => {
      document.getElementById("hijriDate").innerText = "Erreur";
    });
</script>

</body>
</html>
