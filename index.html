<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Hijri Date Widget</title>
  <style>
    html, body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .widget {
      text-align: center;
      padding: 20px;
      width: 100%;
    }

    .hijri {
      font-size: clamp(14px, 4vw, 28px); /* taille adaptative */
      font-weight: bold;
      white-space: nowrap; /* empêche le retour à la ligne */
    }
  </style>
</head>
<body>

<div class="widget">
  <div class="hijri" id="hijriDate"></div>
</div>

<script>
  const today = new Date();

  fetch(`https://api.aladhan.com/v1/gToH?date=${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}&method=4`)
    .then(response => response.json())
    .then(data => {
      const hijri = data.data.hijri;
      const hijriDate = `${hijri.day} ${hijri.month.en} ${hijri.year} AH`; // tu peux remplacer "en" par "ar" si tu veux en arabe
      document.getElementById("hijriDate").innerText = hijriDate;
    })
    .catch(() => {
      document.getElementById("hijriDate").innerText = "Erreur";
    });
</script>

</body>
</html>
