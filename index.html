<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hijri Date Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center; /* centre horizontal */
      align-items: center;     /* centre vertical */
      text-align: center;
    }

    .hijri {
      color: #fff;
      font-size: clamp(28px, 7vw, 48px); /* bien grand */
      font-weight: bold;
      line-height: 1.3;
    }
  </style>
</head>

<body>

<div class="hijri" id="hijriDate">Loading...</div>

<script>
  const today = new Date();

  fetch(`https://api.aladhan.com/v1/gToH?date=${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}`)
    .then(response => response.json())
    .then(data => {
      const hijri = data.data.hijri;
      const hijriDate = `${hijri.day} ${hijri.month.en} ${hijri.year} AH`;
      document.getElementById("hijriDate").innerText = hijriDate;
    })
    .catch(() => {
      document.getElementById("hijriDate").innerText = "Erreur";
    });
</script>

</body>
</html>
